<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Assistant</title>
    <!-- Dependencies -->
    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    
    <style>
        :root {
            --primary: #4a90e2;
            --accent: #00f2fe;
            --bg: #f4f7f9;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .hidden { display: none !important; }

        /* UI Components */
        .preview-container {
            position: relative;
            width: 100%;
            min-height: 200px;
            border: 2px dashed #ccc;
            border-radius: 10px;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #fafafa;
        }

        #uiPreview {
            max-width: 100%;
            display: none;
        }

        /* Scan Line Animation */
        #scanLine {
            display: none;
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            top: 0;
            z-index: 10;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 1rem;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            background: var(--primary);
            color: white;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .status-bar {
            margin: 10px 0;
            font-size: 0.9rem;
            color: #666;
            text-align: center;
        }

        #webViewOutput {
            padding: 1rem;
            border: 1px solid #eee;
            border-radius: 8px;
            line-height: 1.6;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        /* Loader */
        .loader-spin {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Exam Engine</h2>

    <div id="inputSection">
        <textarea id="quizDescription" placeholder="Enter Subject/Context (e.g., Mathematics, Grade 4 English)..."></textarea>
        
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()" style="background: #6c757d; width: 100%;">
            📷 Upload Image
        </button>

        <div class="preview-container">
            <div id="scanLine"></div>
            <p id="placeholderText">No image selected</p>
            <img id="uiPreview" src="#" alt="Preview">
        </div>

        <p id="statusLabel" class="status-bar">Ready</p>

        <div class="controls">
            <button onclick="startAI('solve')">Solve</button>
            <button onclick="startAI('summarize')">Summarize</button>
            <button onclick="startAI('necta')">NECTA Mode</button>
        </div>
    </div>

    <div id="resultSection" class="hidden">
        <button onclick="resetUI()" style="background: #f44336; margin-bottom: 10px;">← Back / Reset</button>
        <div id="loader" class="hidden">
            <div class="loader-spin"></div>
            <p id="loaderText" style="text-align: center;">AI is thinking...</p>
        </div>
        <div id="status" class="status-bar"></div>
        <div id="webViewOutput"></div>
    </div>
</div>

<script>
    let processedImageData = null;

    // 1. Unified Handle File & Preprocess
    async function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const statusLabel = document.getElementById('statusLabel');
        statusLabel.innerText = "Processing Image Quality...";

        // Process image to Base64 (Awaiting the promise)
        processedImageData = await preprocessImage(file);

        // Update UI
        const img = document.getElementById('uiPreview');
        img.src = processedImageData;
        img.style.display = "block";
        document.getElementById('placeholderText').style.display = "none";
        statusLabel.innerText = "Image Ready!";
    }

    function preprocessImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imgObj = new Image();
                imgObj.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 1200;
                    const scale = Math.min(1, maxW / imgObj.width);
                    
                    canvas.width = imgObj.width * scale;
                    canvas.height = imgObj.height * scale;
                    
                    // Apply filters for better OCR
                    ctx.filter = 'grayscale(100%) contrast(140%)';
                    ctx.drawImage(imgObj, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.8));
                };
                imgObj.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    // 2. Main AI Engine
    async function startAI(mode) {
        if (!processedImageData) return alert("Please select an image first!");

        if (!puter.auth.isSignedIn()) {
            alert("Please sign in to Puter to use AI features.");
            puter.auth.signIn();
            return;
        }

        const status = document.getElementById('status');
        const scanLine = document.getElementById('scanLine');
        const loader = document.getElementById('loader');
        
        // UI State
        document.getElementById('inputSection').classList.add('hidden');
        document.getElementById('resultSection').classList.remove('hidden');
        scanLine.style.display = "block";
        loader.classList.remove('hidden');
        status.innerText = "OCR: Extracting text from image...";

        try {
            // Step 1: OCR
            const ocrResult = await Tesseract.recognize(processedImageData, 'eng');
            const ocrText = ocrResult.data.text;
            
            status.innerText = "OCR Complete. Consulting Llama AI...";

            // Step 2: Build Prompt
            const userDetails = document.getElementById('quizDescription').value;
            let finalPrompt = "";

            if (mode === 'solve') {
                finalPrompt = `Solve the following questions found in the text. Provide clear steps. Output in HTML (use <h3> and <p>). Text: ${ocrText}`;
            } else if (mode === 'summarize') {
                finalPrompt = `Summarize this text into study notes with headings. Output in HTML. Text: ${ocrText}`;
            } else if (mode === 'necta') {
                finalPrompt = buildNectaMasterPrompt(userDetails, ocrText);
            }

            // Step 3: Puter AI Call (Correct v2 Syntax)
            const response = await puter.ai.chat([{ role: "user", content: finalPrompt }]);
            
            // Extract content safely
            const aiText = response.message.content;
            document.getElementById('webViewOutput').innerHTML = aiText;

        } catch (error) {
            console.error(error);
            document.getElementById('webViewOutput').innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
        } finally {
            scanLine.style.display = "none";
            loader.classList.add('hidden');
            status.innerText = "Task Finished.";
        }
    }

    function buildNectaMasterPrompt(userDetails, ocrText) {
        const lowInput = userDetails.toLowerCase();
        let sectionA = "- Multiple Choice (i to xv), Matching Column A/B.";
        let sectionB = "- Short answers, sentence re-arrangement, or fill-in-blanks.";
        let sectionC = "- Analytical questions based on diagrams or stories.";
        let subjectNote = "General NECTA Format.";

        if (lowInput.includes("math")) {
            subjectNote = "Primary Math: Numerical operations only.";
            sectionA = "- Question 1 (i to x): Basic Arithmetic (+, -, x, /).";
        }

        return `Act as a NECTA Senior Examiner. Subject: ${userDetails}. 
                Constraint: ${subjectNote}. Rules: HTML only. No Markdown. 
                Use this OCR Context: ${ocrText}
                Structure:
                Section A: ${sectionA}
                Section B: ${sectionB}
                Section C: ${sectionC}
                Include a Marking Scheme in a <div> at the end.`;
    }

    function resetUI() {
        document.getElementById('resultSection').classList.add('hidden');
        document.getElementById('inputSection').classList.remove('hidden');
        document.getElementById('webViewOutput').innerHTML = "";
    }
</script>

</body>
    </html>
