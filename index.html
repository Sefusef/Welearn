<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Hello, World!</title>
  <script>// 1. Keep your key as is
const GEMINI_API_KEY = "AIzaSyCjlE3u1CXlNrZgDfKzYqdcoAD_6K7iwbQ";

// 2. Use the "list" endpoint (no model name in the URL)
// Note: We use ${GEMINI_API_KEY} to insert your actual variable into the string
const url = `https://googleapis.com{GEMINI_API_KEY}`;

async function listSupportedModels() {
  try {
    const response = await fetch(url);
    const data = await response.json();

    // Check if the API returned an error (like an invalid key)
    if (data.error) {
      alert(`API Error: ${data.error.message}`);
      return;
    }

    console.log("Supported Models:", data.models);
    
    // Create a list of names to show in the alert
    let modelList = data.models
      .filter(m => m.supportedGenerationMethods.includes('generateContent'))
      .map(m => `- ${m.name}`)
      .join('\n');

    alert("Models supporting content generation:\n" + modelList);

  } catch (error) {
    alert("Network or Fetch Error: " + error.message);
  }
}

listSupportedModels();

</script>
</head>
<body>
  <h1>
    Hello, World!
  </h1>
</body>
</html>
